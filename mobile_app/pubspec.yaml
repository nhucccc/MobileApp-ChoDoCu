name: cho_do_cu
description: "Chợ Đồ Cũ - Ứng dụng mua bán đồ cũ C2C"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # HTTP & API
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Local storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # Navigation
  go_router: ^14.6.2

  # UI
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  shimmer: ^3.0.0
  badges: ^3.1.2
  timeago: ^3.7.0
  intl: ^0.19.0

  # Chat realtime
  signalr_netcore: ^1.3.6

  # Notifications
  flutter_local_notifications: ^17.2.4

  # Utils
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1
  web: ^1.1.0

  # Video player (mobile)
  video_player: ^2.9.2

  # Google Sign-In (mobile)
  google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
